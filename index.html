<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nepali ↔ English Digit Converter</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
      margin: 40px;
      color: #333;
    }

    .container {
      max-width: 950px;
      margin: auto;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, .08);
    }

    h2 {
      margin-top: 0;
    }

    .description {
      color: #666;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .mode-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .mode-btn {
      background: #e9ecef;
      color: #333;
      border: none;
      padding: 10px 18px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 15px;
      transition: .2s;
    }

    .mode-btn.active {
      background: #1976d2;
      color: white;
    }

    .mode-btn:hover {
      opacity: .9;
    }

    .toggles {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      font-size: 14px;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-label input {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 220px;
      padding: 12px;
      font-size: 16px;
      font-family: Consolas, monospace;
      resize: vertical;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 18px 0;
    }

    button.action {
      background: #1976d2;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 15px;
      transition: .2s;
    }

    button.action:hover {
      background: #125ca3;
    }

    button.action.secondary {
      background: #546e7a;
    }

    button.action.secondary:hover {
      background: #3e5259;
    }

    .toast {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: #2e7d32;
      color: #fff;
      padding: 12px 18px;
      border-radius: 6px;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .2);
      opacity: 0;
      transform: translateY(20px);
      transition: .25s ease;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-weight: bold;
    }

    footer {
      margin-top: 20px;
      font-size: 13px;
      color: #888;
      text-align: center;
    }

    footer a {
      color: #1976d2;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media(max-width:600px) {
      body {
        margin: 15px;
      }

      .buttons {
        flex-direction: column;
      }

      button.action {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>Nepali ↔ English Digit Converter</h2>

    <p class="description">
      Convert only digits while preserving commas, decimals, text, currency symbols,
      and everything else.
    </p>

    <div class="mode-selector">
      <button class="mode-btn active" id="neToEnBtn" onclick="setMode('ne-en')">
        🇳🇵 Nepali → English
      </button>

      <button class="mode-btn" id="enToNeBtn" onclick="setMode('en-ne')">
        🇬🇧 English → Nepali
      </button>
    </div>

    <div class="toggles">
      <label class="toggle-label">
        <input type="checkbox" id="liveToggle" onchange="onLiveToggleChange()">
        Convert as you go (live)
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="pasteToggle" onchange="onPasteToggleChange()">
        Paste to convert &amp; copy
      </label>
    </div>

    <div class="labels">
      <span id="inputLabel">Input (Nepali Digits)</span>
      <span id="outputLabel">Output (English Digits)</span>
    </div>

    <textarea id="input" placeholder="Paste text here..."></textarea>

    <div class="buttons">
      <button class="action" onclick="convert()">Convert</button>
      <button class="action" onclick="convertAndCopy()">Convert & Copy</button>
      <button class="action" onclick="copyResult()">Copy Result</button>
      <button class="action" onclick="swapMode()">⇄ Swap Direction</button>
      <button class="action secondary" onclick="forceConvertAll()">⚡ Force Convert All (→ English)</button>
      <button class="action" onclick="clearAll()">Clear</button>
    </div>

    <textarea id="output" placeholder="Result..." readonly></textarea>

    <footer>
      <a href="https://github.com/ankit-231/unicode-digit-to-english" target="_blank" rel="noopener noreferrer">
        View on GitHub
      </a>
    </footer>

  </div>

  <div id="toast" class="toast"></div>

  <script>
    let mode = "ne-en";
    const STORAGE_KEY = "digitConverterState";

    const neToEn = {
      '०': '0',
      '१': '1',
      '२': '2',
      '३': '3',
      '४': '4',
      '५': '5',
      '६': '6',
      '७': '7',
      '८': '8',
      '९': '9'
    };

    const enToNe = {
      '0': '०',
      '1': '१',
      '2': '२',
      '3': '३',
      '4': '४',
      '5': '५',
      '6': '६',
      '7': '७',
      '8': '८',
      '9': '९'
    };

    function setMode(newMode, opts = {}) {
      mode = newMode;

      document.getElementById("neToEnBtn").classList.toggle("active", mode === "ne-en");
      document.getElementById("enToNeBtn").classList.toggle("active", mode === "en-ne");

      if (mode === "ne-en") {
        inputLabel.textContent = "Input (Nepali Digits)";
        outputLabel.textContent = "Output (English Digits)";
        input.placeholder = "Paste Nepali digits here...\n\n३८,१८०.६३";
      } else {
        inputLabel.textContent = "Input (English Digits)";
        outputLabel.textContent = "Output (Nepali Digits)";
        input.placeholder = "Paste English digits here...\n\n38,180.63";
      }

      if (!opts.preserveOutput) {
        output.value = "";
      }

      saveState();
    }

    function swapMode() {
      if (mode === "ne-en") {
        setMode("en-ne");
      } else {
        setMode("ne-en");
      }
    }

    function convert() {
      const text = input.value;

      let result;

      if (mode === "ne-en") {
        result = text.replace(/[०-९]/g, d => neToEn[d]);
      } else {
        result = text.replace(/[0-9]/g, d => enToNe[d]);
      }

      output.value = result;
      saveState();
      return result;
    }

    function forceConvertAll() {
      // Normalizes every digit in the text to English digits,
      // regardless of the currently selected mode.
      const text = input.value;
      const result = text.replace(/[०-९]/g, d => neToEn[d]);

      output.value = result;
      showToast("Force converted all digits to English");
      saveState();
    }

    function showToast(message, color = "#2e7d32") {
      const toast = document.getElementById("toast");

      toast.textContent = message;
      toast.style.background = color;

      toast.classList.add("show");

      clearTimeout(toast.timer);

      toast.timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2000);
    }

    async function copyResult() {

      if (!output.value) {
        showToast("Nothing to copy", "#ef6c00");
        return;
      }

      try {
        await navigator.clipboard.writeText(output.value);
      } catch {
        output.select();
        document.execCommand("copy");
      }

      showToast("Copied to clipboard!");
    }

    function convertAndCopy() {
      convert();
      copyResult();
    }

    function clearAll() {
      input.value = "";
      output.value = "";
      input.focus();
      saveState();
    }

    // ---- Live "convert as you go" mode ----
    function onLiveToggleChange() {
      saveState();
    }

    // ---- "Paste to convert & copy" mode ----
    function onPasteToggleChange() {
      saveState();
    }

    function handleInputEvent() {
      if (document.getElementById("liveToggle").checked) {
        convert();
      } else {
        saveState();
      }
    }

    function handlePasteEvent() {
      if (document.getElementById("pasteToggle").checked) {
        // wait for the pasted content to actually land in the textarea
        setTimeout(() => {
          convertAndCopy();
        }, 0);
      }
    }

    // ---- sessionStorage persistence ----
    function saveState() {
      try {
        const state = {
          mode,
          liveMode: document.getElementById("liveToggle").checked,
          pasteMode: document.getElementById("pasteToggle").checked,
          inputText: input.value,
          outputText: output.value
        };
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        // sessionStorage unavailable (e.g. private browsing) - fail silently
      }
    }

    function restoreState() {
      let state = null;
      try {
        const raw = sessionStorage.getItem(STORAGE_KEY);
        if (raw) state = JSON.parse(raw);
      } catch (e) {
        state = null;
      }

      if (state) {
        setMode(state.mode || "ne-en", { preserveOutput: true });
        document.getElementById("liveToggle").checked = !!state.liveMode;
        document.getElementById("pasteToggle").checked = !!state.pasteMode;
        input.value = state.inputText || "";
        output.value = state.outputText || "";
      } else {
        setMode("ne-en");
      }
    }

    input.addEventListener("input", handleInputEvent);
    input.addEventListener("paste", handlePasteEvent);

    restoreState();
    input.focus();
  </script>

</body>

</html>
